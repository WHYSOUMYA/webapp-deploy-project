<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="900" height="460" fill="#ffffff"/>

  <text x="30" y="35" font-family="Arial" font-size="20" font-weight="bold" fill="#111">Architecture: Automated Web Application Deployment</text>

  <rect x="30" y="70" width="150" height="70" rx="6" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="105" y="100" font-family="Arial" font-size="13" text-anchor="middle" fill="#111">Developer</text>
  <text x="105" y="118" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">git push</text>

  <rect x="230" y="70" width="150" height="70" rx="6" fill="#eef2ff" stroke="#4f46e5"/>
  <text x="305" y="100" font-family="Arial" font-size="13" text-anchor="middle" fill="#111">GitHub</text>
  <text x="305" y="118" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Source repository</text>

  <rect x="430" y="70" width="160" height="70" rx="6" fill="#fef3c7" stroke="#b45309"/>
  <text x="510" y="95" font-family="Arial" font-size="13" text-anchor="middle" fill="#111">Jenkins</text>
  <text x="510" y="112" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Build, scan, push</text>
  <text x="510" y="127" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">SonarQube + Trivy</text>

  <rect x="650" y="70" width="180" height="70" rx="6" fill="#dcfce7" stroke="#15803d"/>
  <text x="740" y="100" font-family="Arial" font-size="13" text-anchor="middle" fill="#111">Docker Hub</text>
  <text x="740" y="118" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Container registry</text>

  <line x1="180" y1="105" x2="230" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="105" x2="430" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="590" y1="105" x2="650" y2="105" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="60" y="200" font-family="Arial" font-size="15" font-weight="bold" fill="#111">AWS Cloud (Region: ap-south-1)</text>
  <rect x="50" y="215" width="760" height="200" rx="8" fill="none" stroke="#94a3b8" stroke-dasharray="4,3"/>

  <rect x="80" y="245" width="700" height="140" rx="6" fill="#f1f5f9" stroke="#334155"/>
  <text x="430" y="265" font-family="Arial" font-size="13" text-anchor="middle" fill="#111">VPC (10.0.0.0/16)</text>

  <rect x="110" y="285" width="300" height="80" rx="6" fill="#e0f2fe" stroke="#0369a1"/>
  <text x="260" y="305" font-family="Arial" font-size="12" text-anchor="middle" fill="#111">Public Subnet</text>
  <text x="260" y="322" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Internet Gateway</text>
  <text x="260" y="337" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Route Table</text>

  <rect x="450" y="285" width="300" height="80" rx="6" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="600" y="305" font-family="Arial" font-size="12" text-anchor="middle" fill="#111">EC2 Instance</text>
  <text x="600" y="322" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Security Group: 22, 80, 5000</text>
  <text x="600" y="337" font-family="Arial" font-size="11" text-anchor="middle" fill="#444">Docker container running app</text>

  <line x1="410" y1="325" x2="450" y2="325" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="740" y1="140" x2="600" y2="285" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="700" y="200" font-family="Arial" font-size="10" fill="#444">docker pull / deploy</text>

  <text x="60" y="440" font-family="Arial" font-size="11" fill="#666">Terraform provisions VPC, subnet, security group, and EC2. Jenkins builds, scans, and pushes the image. EC2 pulls and runs it.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
