<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automated Deployment Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        h1 {
            color: #222;
        }
        p {
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Deployment Successful</h1>
        <p>This page is served from container: {{ hostname }}</p>
        <p>Deployed via Terraform, Docker, and Jenkins on AWS EC2.</p>
    </div>
</body>
</html>
